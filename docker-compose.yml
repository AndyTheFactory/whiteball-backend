version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whiteball-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whiteball
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: whiteball-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whiteball
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app

volumes:
  postgres_data:
